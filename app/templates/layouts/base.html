<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title if page_title else "VoiceAI - AI Video Dubbing Platform" }}</title>
    
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="/static/css/variables.css?v=2.0">
    <link rel="stylesheet" href="/static/css/main.css?v=2.0">
    <link rel="stylesheet" href="/static/css/layout.css?v=2.0">
    <link rel="stylesheet" href="/static/css/components.css?v=2.0">
    {% block extra_css %}{% endblock %}

    <!-- Theme Logic (Chạy ngay trước khi render để tránh flash màn hình trắng) -->
    <script src="/static/js/theme.js"></script>
    <script>
        // Khóa giao diện sidebar lập tức trước khi render body để chống giật tuyệt đối
        (function() {
            var isCollapsed = localStorage.getItem("voiceai-sidebar-collapsed") === "true";
            if (isCollapsed && window.innerWidth > 768) {
                document.documentElement.classList.add("sidebar-collapsed-init");
            }
        })();
    </script>
</head>
<body class="preload">

    <div class="app-container" id="app-container">
        <script>
            (function() {
                var isCollapsed = localStorage.getItem("voiceai-sidebar-collapsed") === "true";
                if (isCollapsed && window.innerWidth > 768) {
                    document.getElementById("app-container").classList.add("sidebar-collapsed");
                }
            })();
        </script>
        <!-- Sidebar Component -->
        {% include 'components/sidebar.html' %}
        
        <!-- Header Component -->
        {% include 'components/header.html' %}
        
        <!-- Main Area -->
        <main class="app-main">
            <div class="content-wrapper">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Scripts -->
    <script src="/static/js/main.js?v=2.0"></script>
    <script>
        // Khởi tạo các icon của Lucide và giải phóng khóa kích thước sidebar ngay lập tức
        if (typeof lucide !== "undefined") {
            lucide.createIcons();
        }
        document.documentElement.classList.remove("sidebar-collapsed-init");

        // Xóa class preload sau khi load xong hoàn toàn
        window.addEventListener("load", () => {
            document.body.classList.remove("preload");
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
