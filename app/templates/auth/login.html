{% extends 'layouts/base.html' %}

{% block content %}
<style>
    /* CSS Bento Card & Glassmorphism 2.0 cho Auth Forms */
    .auth-bento-card {
        background: rgba(13, 18, 30, 0.5) !important;
        backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        border-radius: var(--radius-lg);
        padding: var(--space-xl) var(--space-lg);
        max-width: 420px;
        width: 100%;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
        display: flex;
        flex-direction: column;
        gap: var(--space-md);
    }
    
    :root[data-theme="light"] .auth-bento-card {
        background: rgba(255, 255, 255, 0.75) !important;
        border: 1px solid rgba(0, 0, 0, 0.08) !important;
        box-shadow: 0 15px 40px rgba(31, 38, 135, 0.06);
    }

    /* Glassmorphic input controls */
    .glass-input {
        background: rgba(0, 0, 0, 0.25) !important;
        border: 1px solid rgba(255, 255, 255, 0.06) !important;
        color: var(--text-primary) !important;
        border-radius: var(--radius-md) !important;
        padding: 12px 14px 12px 42px !important;
        font-size: 14px;
        transition: all var(--transition-fast);
        outline: none;
        width: 100%;
    }

    :root[data-theme="light"] .glass-input {
        background: rgba(255, 255, 255, 0.8) !important;
        border: 1px solid rgba(0, 0, 0, 0.08) !important;
    }

    .glass-input:focus {
        border-color: var(--color-primary) !important;
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.25);
    }

    .form-group-with-icon {
        position: relative;
        display: flex;
        align-items: center;
    }

    .form-group-with-icon i {
        position: absolute;
        left: 14px;
        color: var(--text-tertiary);
        pointer-events: none;
        transition: color 0.2s;
    }

    .glass-input:focus + i, 
    .form-group-with-icon:focus-within i {
        color: var(--color-primary);
    }

    /* Shiny gradient button */
    .shiny-btn {
        background: linear-gradient(135deg, #0ea5e9, #0284c7) !important;
        color: white !important;
        font-weight: 700;
        border: none !important;
        border-radius: var(--radius-md);
        box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3) !important;
        cursor: pointer;
        transition: all var(--transition-normal);
        position: relative;
        overflow: hidden;
    }

    .shiny-btn::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        transition: all 0.6s ease;
    }

    .shiny-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.45) !important;
    }

    .shiny-btn:hover::before {
        left: 100%;
    }
</style>

<div class="flex-center" style="min-height: calc(100vh - var(--header-height) - var(--space-xl)); padding: var(--space-md) 0;">
    <div class="auth-bento-card">
        <div style="text-align: center; margin-bottom: var(--space-xs);">
            <div style="width: 60px; height: 60px; border-radius: var(--radius-full); background: rgba(56,189,248,0.08); color: var(--color-primary); margin: 0 auto 12px auto; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="lock" style="width: 28px; height: 28px;"></i>
            </div>
            <h2 style="font-size: 26px; font-weight: 800; margin: 0 0 6px 0; background: linear-gradient(to right, #fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Chào mừng trở lại</h2>
            <p style="font-size: 14px; color: var(--text-secondary); margin: 0;">Đăng nhập tài khoản VoiceAI của bạn</p>
        </div>

        {% if error %}
        <div class="badge badge-failed" style="width: 100%; padding: 12px; border-radius: var(--radius-md); font-size: 13.5px; text-transform: none; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="alert-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="badge badge-completed" style="width: 100%; padding: 12px; border-radius: var(--radius-md); font-size: 13.5px; text-transform: none; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="check-circle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
            {{ success }}
        </div>
        {% endif %}

        <form action="/auth/login" method="POST" style="display: flex; flex-direction: column; gap: var(--space-md); margin-top: 4px;">
            <div class="form-group">
                <label for="email" class="form-label" style="font-weight: 600; margin-bottom: 6px;">Địa chỉ Email</label>
                <div class="form-group-with-icon">
                    <input type="email" id="email" name="email" class="glass-input" placeholder="ten@congty.com" required>
                    <i data-lucide="mail" style="width: 16px; height: 16px;"></i>
                </div>
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                    <label for="password" class="form-label" style="font-weight: 600; margin-bottom: 0;">Mật khẩu</label>
                    <a href="#" style="font-size: 12px; color: var(--color-primary); font-weight: 600;">Quên mật khẩu?</a>
                </div>
                <div class="form-group-with-icon">
                    <input type="password" id="password" name="password" class="glass-input" placeholder="••••••••" required>
                    <i data-lucide="key-round" style="width: 16px; height: 16px;"></i>
                </div>
            </div>

            <button type="submit" class="btn shiny-btn hover-scale" style="width: 100%; margin-top: 6px; padding: 12px;">
                Đăng nhập
            </button>
        </form>

        <div style="text-align: center; margin-top: 4px; font-size: 13px; color: var(--text-secondary); border-top: 1px solid rgba(255,255,255,0.05); padding-top: var(--space-md);">
            Chưa có tài khoản? 
            <a href="/auth/register" style="color: var(--color-primary); font-weight: 700;">Đăng ký ngay</a>
        </div>
    </div>
</div>
{% endblock %}
