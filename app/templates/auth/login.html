{% extends 'layouts/base.html' %}

{% block content %}
<div class="flex-center" style="min-height: calc(100vh - var(--header-height) - var(--space-xl)); padding: var(--space-md) 0;">
    <div class="card glass" style="max-width: 420px; width: 100%; padding: var(--space-lg); border-radius: var(--radius-xl);">
        <div style="text-align: center; margin-bottom: var(--space-xs);">
            <span style="font-size: 40px;">🔑</span>
            <h2 style="font-size: 26px; font-weight: 800; margin-top: var(--space-xs);">Chào mừng trở lại</h2>
            <p style="font-size: 14px; color: var(--text-secondary); margin-top: 4px;">Đăng nhập tài khoản VoiceAI của bạn</p>
        </div>

        {% if error %}
        <div class="badge badge-failed" style="width: 100%; padding: 10px; border-radius: var(--radius-md); font-size: 13px; text-transform: none; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="alert-circle" style="width: 16px; height: 16px;"></i>
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="badge badge-completed" style="width: 100%; padding: 10px; border-radius: var(--radius-md); font-size: 13px; text-transform: none; display: flex; align-items: center; gap: 8px;">
            <i data-lucide="check-circle" style="width: 16px; height: 16px;"></i>
            {{ success }}
        </div>
        {% endif %}

        <form action="/auth/login" method="POST" style="display: flex; flex-direction: column; gap: var(--space-sm); margin-top: var(--space-xs);">
            <div class="form-group">
                <label for="email" class="form-label">Địa chỉ Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="ten@congty.com" required>
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label for="password" class="form-label">Mật khẩu</label>
                    <a href="#" style="font-size: 12px; color: var(--color-primary); font-weight: 500;">Quên mật khẩu?</a>
                </div>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary hover-scale" style="width: 100%; margin-top: var(--space-xs); padding: 12px;">
                Đăng nhập
            </button>
        </form>

        <div style="text-align: center; margin-top: var(--space-sm); font-size: 13px; color: var(--text-secondary);">
            Chưa có tài khoản? 
            <a href="/auth/register" style="color: var(--color-primary); font-weight: 600;">Đăng ký ngay</a>
        </div>
    </div>
</div>
{% endblock %}
